<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />

    <!-- PWA & Identidad -->
    <title>Míster11 — El banquillo en tu bolsillo</title>
    <meta name="description" content="Gestiona tu equipo, sesiones, tácticas y rendimiento desde el banquillo." />
    <meta name="theme-color" content="#1a3d1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Míster11" />

    <!-- Iconos -->
    <link rel="icon" type="image/png" href="/logo_mister11.png" />
    <link rel="apple-touch-icon" href="/logo_mister11.png" />

    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Control de Errores de Importación Dinámica (Vite Chunks) -->
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.indexOf('Failed to fetch dynamically imported module') !== -1 || e.message.indexOf('ChunkLoadError') !== -1)) {
          console.warn('[Míster11] Error de importación de chunk detectado. Forzando recarga de caché...');
          window.location.reload(true);
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Solo registrar Service Worker en web normal (no en entorno nativo Capacitor)
      if ('serviceWorker' in navigator && !window.Capacitor) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('[SW] Service Worker registrado correctamente.'))
            .catch((err) => console.warn('[SW] Error al registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
